  '''(^|/)\.agents/''',
  '''(^|/)\.agent/''',
  '''(^|/)\.codex/''',
  '''(^|/)\.claude/''',
  '''(^|/)\.venv/''',
  '''(^|/)\.pytest_cache/''',
  '''(^|/)\.runtime-cache/''',
  '''(^|/)cache/''',
  '''(^|/)logs/''',
  '''(^|/)output/''',
  '''(^|/)tests/__pycache__/''',
  '''(^|/)scripts/ci/__pycache__/''',
]
