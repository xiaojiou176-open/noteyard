name: notestorelab-case-review
description: Guide one bounded NoteStore Lab case review without turning the repo into a hosted platform.
version: 0.1.0.post1
homepage: https://github.com/xiaojiou176-open/noteyard
repository: https://github.com/xiaojiou176-open/noteyard
license: MIT
entrypoint: ./SKILL.md
capabilities:
  - bounded-case-review
  - derived-artifact-first-guidance
  - evidence-backed-ask-case
scope:
  - local-copy-first
  - one-case-root-at-a-time
  - public-safe-demo-supported
runtime:
  host_assumptions:
    - macOS case-root workflow remains the product truth
    - local stdio MCP hosts can consume the review surface
    - copied evidence only; never the live Notes store
install_guidance:
  - Use this directory as the canonical independent skill surface.
  - Treat plugin and starter skill files as host-specific derived copies.
  - Do not claim official listing without fresh platform read-back.
